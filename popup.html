<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yosik Confluence Export</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="6" fill="white"/>
          <text x="16" y="24" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="600">
            <tspan fill="url(#grad)">Y</tspan>
          </text>
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#5856d6"/>
              <stop offset="100%" stop-color="#7c3aed"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="logo-text">Yosik Export</span>
      </div>
      <div id="space-info" class="space-info" hidden>
        <span id="space-name" class="space-badge"></span>
      </div>
    </header>

    <!-- Search -->
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="7" cy="7" r="5"/><path d="M11 11l3.5 3.5"/>
      </svg>
      <input id="tree-search" class="search-input" type="text" placeholder="Поиск по названию..." disabled />
    </div>

    <!-- Tree -->
    <div id="tree-container" class="tree-container">
      <div id="tree-loading" class="tree-placeholder">
        <div class="spinner"></div>
        <span>Загрузка дерева страниц...</span>
      </div>
      <div id="tree-content" class="tree-content" hidden></div>
    </div>

    <!-- Selection actions -->
    <div class="select-actions">
      <button id="btn-select-all" class="btn btn-ghost btn-sm" disabled>Выбрать все</button>
      <button id="btn-deselect-all" class="btn btn-ghost btn-sm" disabled>Снять все</button>
      <span id="select-count" class="select-count">0 выбрано</span>
    </div>

    <!-- Export button -->
    <button id="btn-export" class="btn btn-primary" disabled>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8 2v8m0 0l-3-3m3 3l3-3M3 12h10"/>
      </svg>
      Экспортировать
    </button>

    <!-- Settings -->
    <div class="settings-col">
      <label class="checkbox-row" title="Экспортировать только страницы, изменённые после предыдущего экспорта">
        <input id="chk-incremental" type="checkbox" class="tree-checkbox" />
        <span>Только изменённые с последнего экспорта</span>
      </label>
      <div class="checkbox-with-option">
        <label class="checkbox-row">
          <input id="chk-attachments" type="checkbox" class="tree-checkbox" />
          <span>Скачивать вложения</span>
        </label>
        <select id="max-attachment-size" class="setting-select" hidden>
          <option value="102400">до 100 КБ</option>
          <option value="524288">до 500 КБ</option>
          <option value="1048576">до 1 МБ</option>
          <option value="5242880">до 5 МБ</option>
          <option value="10485760" selected>до 10 МБ</option>
          <option value="52428800">до 50 МБ</option>
          <option value="0">без лимита</option>
        </select>
      </div>
      <label class="checkbox-row">
        <input id="chk-order" type="checkbox" class="tree-checkbox" />
        <span>Нумерация для сортировки (01-, 02-...)</span>
      </label>
    </div>

    <!-- Progress -->
    <div id="progress-section" class="progress-section" hidden>
      <div class="progress-row">
        <div class="progress-bar-wrap">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <button id="btn-cancel" class="btn-cancel" hidden title="Отменить">&times;</button>
      </div>
      <div id="active-threads" class="active-threads" hidden></div>
      <p id="status" class="status-text">Ready</p>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span>Obsidian-compatible Markdown</span>
      <span class="dot"></span>
      <!-- TODO: detect Cloud vs Server -->
      <span id="footer-api-type">Confluence Server</span>
      <button id="btn-logs" class="btn-logs" title="Copy debug logs">logs</button>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
